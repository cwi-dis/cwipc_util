name: CMake Build Matrix

on: [push]

jobs:
  build:
    name: ${ { matrix.config.name } }
    runs-on: ${ { matrix.config.os } }
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Windows Latest MSVC", artifact: "cwipc_util_win1064.zip",
            os: windows-latest,
#            build_type: "Release", cc: "cl", cxx: "cl",
            environment_script: "C:/Program Files (x86)/Microsoft Visual Studio/2019/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
          }
        - {
            name: "Ubuntu Latest GCC", artifact: "cwipc_util_ubuntu1804.tgz",
            os: ubuntu-latest,
#            build_type: "Release", cc: "gcc", cxx: "g++"
          }
        - {
            name: "macOS Latest Clang", artifact: "cwipc_util_osx1015",
            os: macos-latest,
#            build_type: "Release", cc: "clang", cxx: "clang++"
          }
    steps:
    - name: Build & Test
      uses: ashutoshvarma/action-cmake-build@master
      with:
        build-dir: ${{ runner.workspace }}/build
#          # will set the CC & CXX for cmake
#          cc: gcc
#          cxx: g++
#          build-type: Release
#          # Extra options pass to cmake while configuring project
#          configure-options: -DCMAKE_C_FLAGS=-w32 -DPNG_INCLUDE=OFF
        run-test: true
#          ctest-options: -R mytest
      # install the build using cmake --install
        install-build: true
#          # run build using '-j [parallel]' to use multiple threads to build
#          parallel: 14